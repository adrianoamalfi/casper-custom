name: Test
on:
  pull_request:
  push:
    branches:
      - main
      - 'renovate/*'
      - develop
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'  # Added support for release branches
jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@v4
      - run: yarn
      - run: yarn test:ci
